kind = "web"
previewPath = "/"
title = "StudentHub"
version = "1.0.0"
id = "artifacts/studenthub"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21995

[services.development]
run = "pnpm --filter @workspace/studenthub run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/studenthub", "run", "build" ]
publicDir = "artifacts/studenthub/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21995"
BASE_PATH = "/"
